name: Daily Intelligence Report

on:
  schedule:
    - cron: '51 23 * * *'  # UTC 23:51 = 北京 07:51（避开整点高峰）
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Morning Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_BASE_URL: https://api.x.ai/v1/chat/completions
          XAI_MODEL: grok-4-fast
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          python cli.py
          echo "DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Commit report back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REPORT="reports/daily_briefings/Morning_Report_${DATE}.md"
          echo "DATE=$DATE"
          echo "Looking for: $REPORT"
          ls -la "$REPORT" 2>&1 || echo "File not found"
          git add -f "$REPORT" 2>&1
          git status --short
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: add daily report ${DATE}"
            git push
            echo "Report committed: $REPORT"
          fi

      - name: Send report via email
        if: ${{ vars.MAIL_TO != '' }}
        run: |
          REPORT="reports/daily_briefings/Morning_Report_${DATE}.md"
          if [ ! -f "$REPORT" ]; then
            echo "❌ Report not found"
            exit 1
          fi
          # Use curl to send via Gmail SMTP (or skip if not configured)
          if [ -n "${{ secrets.MAIL_PASSWORD }}" ]; then
            python -c "
          import smtplib
          from email.mime.text import MIMEText
          report = open('$REPORT', 'r', encoding='utf-8').read()
          msg = MIMEText(report, 'plain', 'utf-8')
          msg['Subject'] = '🌐 全球情报日报 - ${DATE}'
          msg['From'] = '${{ secrets.MAIL_USERNAME }}'
          msg['To'] = '${{ vars.MAIL_TO }}'
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login('${{ secrets.MAIL_USERNAME }}', '${{ secrets.MAIL_PASSWORD }}')
              s.send_message(msg)
          print('✅ Email sent to ${{ vars.MAIL_TO }}')
          "
          else
            echo "ℹ️ Email skipped (set MAIL_USERNAME, MAIL_PASSWORD secrets and MAIL_TO variable)"
          fi
